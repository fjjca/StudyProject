<!-- src/main/resources/static/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        textarea {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #response {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        /* Loading Spinner */
        #loading {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<h1>输入问题</h1>
<textarea id="userMessage" rows="4" placeholder="请输入您的问题..."></textarea><br><br>
<button onclick="sendMessage()">发送</button>

<div id="loading"></div>
<div id="response"></div>

<!-- 其他部分完全不变，只改 script 内部 -->
<script>
    function sendMessage() {
        const message = document.getElementById('userMessage').value;
        if (!message) {
            alert('请输入消息');
            return;
        }

        const responseDiv = document.getElementById('response');
        const loadingDiv = document.getElementById('loading');

        // 清空上次内容，显示加载动画
        responseDiv.innerHTML = '';
        loadingDiv.style.display = 'block';

        // 发起流式请求
        fetch(`/ai/generateStream?message=${encodeURIComponent(message)}`)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let accumulated = '';

                function readStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            loadingDiv.style.display = 'none';
                            return;
                        }
                        // 解码并追加内容
                        const chunk = decoder.decode(value, { stream: true });
                        accumulated += chunk;
                        // 实时渲染 Markdown
                        responseDiv.innerHTML = marked.parse(accumulated);
                        // 自动滚动到底部
                        responseDiv.scrollTop = responseDiv.scrollHeight;
                        // 继续读取下一块
                        readStream();
                    }).catch(err => {
                        console.error('流读取错误:', err);
                        loadingDiv.style.display = 'none';
                        responseDiv.innerHTML = '<span style="color:red;">请求失败，请稍后再试</span>';
                    });
                }
                readStream();
            })
            .catch(error => {
                console.error('请求失败:', error);
                loadingDiv.style.display = 'none';
                responseDiv.innerHTML = '<span style="color:red;">请求失败，请稍后再试</span>';
            });
    }
</script>
</body>
</html>
